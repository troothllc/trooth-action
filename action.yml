name: Trooth Compliance Scan
description: Run a Trooth compliance scan on every push. Continuous AI compliance monitoring against SOC 2, ISO 27001, EU AI Act, NIST AI RMF, and HIPAA.
author: Trooth, LLC
branding:
  icon: shield
  color: green

inputs:
  api-key:
    description: Your Trooth API key. Get one free at https://www.trooth.co. Pass via secrets.TROOTH_API_KEY.
    required: true
  frameworks:
    description: Comma-separated list of frameworks to scan against. Options - soc2, iso27001, eu-ai-act, nist-ai-rmf, hipaa. Default - all enabled on your tier.
    required: false
    default: ""
  fail-on:
    description: Severity level that fails the workflow. Options - critical, high, medium, low, none. Default - critical.
    required: false
    default: critical
  comment-on-pr:
    description: Post the scan summary as a PR comment. Default - true.
    required: false
    default: "true"
  trooth-host:
    description: Trooth API host. Override for staging or self-hosted environments. Default - https://api.trooth.co.
    required: false
    default: https://api.trooth.co

outputs:
  score:
    description: Composite Trust Score from the scan (300 to 850 scale).
    value: ${{ steps.scan.outputs.score }}
  status:
    description: Pass or fail relative to the fail-on input.
    value: ${{ steps.scan.outputs.status }}
  report-url:
    description: URL of the full scan report in your Trooth Public Trust Profile.
    value: ${{ steps.scan.outputs.report-url }}
  findings-count:
    description: Total number of findings produced by the scan.
    value: ${{ steps.scan.outputs.findings-count }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [ -z "${{ inputs.api-key }}" ]; then
          echo "::error::api-key input is required. Pass via secrets.TROOTH_API_KEY."
          exit 1
        fi
        echo "Trooth Action v0.1 - scaffold mode"
        echo "Frameworks - ${{ inputs.frameworks }}"
        echo "Fail on - ${{ inputs.fail-on }}"

    - name: Run Trooth scan
      id: scan
      shell: bash
      run: |
        echo "::notice::Trooth Action is in scaffold mode through August 1, 2026. Production scans begin August 2, 2026 (EU AI Act enforcement day). Until then, this Action validates configuration and emits placeholder outputs so you can wire it into your workflow now."
        echo "score=PENDING" >> "$GITHUB_OUTPUT"
        echo "status=scaffold" >> "$GITHUB_OUTPUT"
        echo "report-url=https://www.trooth.co" >> "$GITHUB_OUTPUT"
        echo "findings-count=0" >> "$GITHUB_OUTPUT"
        echo ""
        echo "Score - PENDING (production: August 2, 2026)"
        echo "Status - scaffold"
        echo "Findings - 0"

    - name: Summary
      shell: bash
      run: |
        echo "## Trooth Compliance Scan" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "Status: scaffold mode (production: August 2, 2026)" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "Configure this Action now to have full compliance scans land automatically the day the Trooth API goes live." >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "See [trooth.co](https://www.trooth.co) for more." >> "$GITHUB_STEP_SUMMARY"
